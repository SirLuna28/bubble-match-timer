workflows:
  ios-build-and-upload:
    name: Build and Upload to App Store
    instance_type: mac_mini_m1
    max_build_duration: 120
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_id: com.loujjstudio.bubblematchtime
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.loujjstudio.bubblematchtime"
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
    
    scripts:
      - name: Install Node dependencies
        script: |
          npm install -g pnpm
          pnpm install
      
      - name: Build web app
        script: |
          pnpm run build
      
      - name: Install Capacitor dependencies
        script: |
          pnpm add -D @capacitor/core @capacitor/cli @capacitor/ios
      
      - name: Copy web assets to iOS
        script: |
          npx cap copy ios
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install --repo-update
          cd ../..
      
      - name: Build iOS app
        script: |
          xcodebuild build \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -derivedDataPath build/ios \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="Apple Distribution"
      
      - name: Create iOS app archive
        script: |
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -derivedDataPath build/ios \
            -archivePath build/ios/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="Apple Distribution"
      
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/ios/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath build/ios/ipa \
            -allowProvisioningUpdates
      
      - name: Upload to App Store Connect
        script: |
          xcrun altool --upload-app \
            --file build/ios/ipa/App.ipa \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
    
    artifacts:
      - build/ios/App.xcarchive
      - build/ios/ipa/*.ipa
    
    publishing:
      email:
        recipients:
          - $DEVELOPER_EMAIL
        notify:
          success: true
          failure: true
